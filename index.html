<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>王者农场 🌱 浇水大作战</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(180deg, #87CEEB 0%, #b8e994 60%, #78e08f 100%);
  min-height: 100vh;
  display: flex; justify-content: center; align-items: center;
  overflow: hidden;
  touch-action: manipulation;
}
.container {
  width: 100%; max-width: 420px; min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 20px; position: relative;
}

/* 天空 */
.sky { position: absolute; top: 0; width: 100%; height: 40%; background: linear-gradient(180deg, #74b9ff, #a29bfe44); z-index: 0; }
.cloud { position: absolute; background: white; border-radius: 50%; opacity: 0.8; z-index: 1; }
.cloud::before, .cloud::after { content: ''; position: absolute; background: white; border-radius: 50%; }
.cloud1 { width: 80px; height: 35px; top: 10%; left: 10%; animation: float 6s ease-in-out infinite; }
.cloud1::before { width: 40px; height: 40px; top: -20px; left: 10px; }
.cloud1::after { width: 50px; height: 30px; top: -10px; left: 35px; }
.cloud2 { width: 60px; height: 28px; top: 20%; right: 15%; animation: float 8s ease-in-out 2s infinite; }
.cloud2::before { width: 35px; height: 32px; top: -15px; left: 5px; }
.cloud2::after { width: 40px; height: 25px; top: -8px; left: 25px; }
@keyframes float { 0%,100% { transform: translateX(0); } 50% { transform: translateX(15px); } }

/* 农场 */
.farm { position: relative; z-index: 2; width: 100%; text-align: center; margin-top: 30px; }
.farm-title { font-size: 26px; font-weight: bold; color: #2d3436; margin-bottom: 5px; text-shadow: 1px 1px 2px rgba(255,255,255,0.5); }
.farm-subtitle { font-size: 13px; color: #636e72; margin-bottom: 25px; }
.sun { font-size: 60px; position: absolute; top: -10px; right: 30px; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }

/* 菜地 */
.garden {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;
  background: #8B6914; border-radius: 20px; padding: 25px 20px;
  margin: 15px 0 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  border: 4px solid #6B4F12; position: relative;
}
.garden::after { content: '🏠 王者农场'; position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%); font-size: 12px; color: #2d3436; white-space: nowrap; }
.crop {
  background: #5D3A1A; border-radius: 12px; padding: 15px 8px;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  border: 2px solid #4A2E12; position: relative;
}
.crop-icon { font-size: 40px; transition: all 0.3s; }
.crop.dry .crop-icon { filter: grayscale(0.3) brightness(0.8); animation: shake 2s ease-in-out infinite; }
.crop.watered .crop-icon { filter: none; }
@keyframes shake { 0%,100% { transform: rotate(0); } 25% { transform: rotate(-3deg); } 75% { transform: rotate(3deg); } }
.crop-name { font-size: 11px; color: #dfe6e9; }
.crop-status { font-size: 10px; padding: 2px 8px; border-radius: 10px; }
.crop.dry .crop-status { background: #ff7675; color: white; }
.crop.watered .crop-status { background: #00b894; color: white; }

/* 按钮 */
.btn-container { position: relative; z-index: 10; width: 100%; display: flex; justify-content: center; min-height: 60px; }
.water-btn {
  background: linear-gradient(135deg, #00b894, #00cec9);
  color: white; font-size: 20px; font-weight: bold;
  padding: 15px 40px; border: none; border-radius: 50px;
  cursor: pointer; box-shadow: 0 8px 25px rgba(0,184,148,0.4);
  transition: all 0.15s ease; position: relative;
  white-space: nowrap; touch-action: manipulation;
  user-select: none; -webkit-tap-highlight-color: transparent;
}
.water-btn:active { transform: scale(0.95); box-shadow: 0 4px 15px rgba(0,184,148,0.3); }
.water-btn.dodging { animation: dodge 0.3s ease; }
@keyframes dodge { 0% { transform: translateX(0) rotate(0); } 30% { transform: translateX(-30px) rotate(-5deg); } 60% { transform: translateX(40px) rotate(3deg); } 100% { transform: translateX(0) rotate(0); } }

/* 消息 */
.msg { margin-top: 15px; font-size: 15px; color: #2d3436; font-weight: bold; text-align: center; min-height: 25px; z-index: 2; }
.msg .counter { font-size: 12px; color: #636e72; margin-top: 5px; }

/* 粒子 */
.particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
.particle { position: absolute; font-size: 20px; animation: flyUp 1s ease-out forwards; }
@keyframes flyUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-80px) scale(0.5); } }

/* 最终胜利弹窗 */
.win-overlay {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.6); z-index: 200;
  justify-content: center; align-items: center;
}
.win-overlay.show { display: flex; }
.win-dialog {
  background: white; border-radius: 20px; padding: 30px; text-align: center;
  max-width: 320px; width: 90%; animation: bounceIn 0.5s ease;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
@keyframes bounceIn {
  0% { transform: scale(0.3); opacity: 0; }
  50% { transform: scale(1.05); }
  70% { transform: scale(0.95); }
  100% { transform: scale(1); opacity: 1; }
}
.win-icon { font-size: 60px; margin-bottom: 15px; }
.win-text { font-size: 18px; font-weight: bold; color: #2d3436; margin-bottom: 10px; }
.win-sub { font-size: 13px; color: #636e72; margin-bottom: 20px; }
.win-close { background: #00b894; color: white; border: none; padding: 10px 30px; border-radius: 30px; font-size: 16px; cursor: pointer; }
</style>
</head>
<body>

<div class="container">
  <div class="sky"></div>
  <div class="cloud cloud1"></div>
  <div class="cloud cloud2"></div>

  <div class="farm">
    <div class="sun">☀️</div>
    <div class="farm-title">🌾 王者农场</div>
    <div class="farm-subtitle">你的菜快渴死了！赶紧浇水！</div>

    <div class="garden" id="garden">
      <div class="crop dry" data-crop="0">
        <span class="crop-icon">🥬</span>
        <span class="crop-name">小乔的菠菜</span>
        <span class="crop-status">💧缺水</span>
      </div>
      <div class="crop dry" data-crop="1">
        <span class="crop-icon">🌶️</span>
        <span class="crop-name">鲁班的辣椒</span>
        <span class="crop-status">💧缺水</span>
      </div>
      <div class="crop dry" data-crop="2">
        <span class="crop-icon">🍆</span>
        <span class="crop-name">貂蝉的茄子</span>
        <span class="crop-status">💧缺水</span>
      </div>
      <div class="crop dry" data-crop="3">
        <span class="crop-icon">🌽</span>
        <span class="crop-name">程咬金的玉米</span>
        <span class="crop-status">💧缺水</span>
      </div>
      <div class="crop dry" data-crop="4">
        <span class="crop-icon">🍅</span>
        <span class="crop-name">安琪拉的番茄</span>
        <span class="crop-status">💧缺水</span>
      </div>
      <div class="crop dry" data-crop="5">
        <span class="crop-icon">🥕</span>
        <span class="crop-name">狄仁杰的萝卜</span>
        <span class="crop-status">💧缺水</span>
      </div>
    </div>
  </div>

  <div class="btn-container" id="btnContainer">
    <button class="water-btn" id="waterBtn" onclick="tryWater()">💧 点击浇水</button>
  </div>

  <div class="msg" id="msg"></div>

  <div id="particles" class="particles"></div>
</div>

<div class="win-overlay" id="winOverlay">
  <div class="win-dialog">
    <div class="win-icon">🎉</div>
    <div class="win-text">你终于浇上水了！</div>
    <div class="win-sub" id="winStats"></div>
    <button class="win-close" onclick="closeWin()">😤 算你狠</button>
  </div>
</div>

<script>
const msgs = [
  "🤔 浇水失败！水壶跑偏了...",
  "🫣 诶？水怎么浇到地上了？",
  "😤 偏不浇！你再点试试？",
  "🏃 水壶：我跑了，你追啊！",
  "🙈 浇不到浇不到~",
  "😈 今日不宜浇水，明天再来",
  "🤪 你的菜：算了吧，我还能撑",
  "💨 手速不够快哦~",
  "😏 浇水申请已收到，不予批准",
  "🫠 服务器繁忙，请稍后再试",
  "🤡 水壶离家出走了！",
  "👻 你以为你能浇到？",
  "😴 太累了，水壶在睡觉",
  "🦥 浇...水...速...度...太...慢",
  "🤯 系统检测到恶意浇水行为"
];

let attempts = 0;
let wateringDone = false;

function getRandomMsg() {
  return msgs[Math.floor(Math.random() * msgs.length)];
}

function createParticles(x, y) {
  const container = document.getElementById('particles');
  const emojis = ['💧', '😢', '💦', '😅', '😂'];
  for (let i = 0; i < 6; i++) {
    const p = document.createElement('span');
    p.className = 'particle';
    p.textContent = emojis[i % emojis.length];
    p.style.left = (x + (Math.random() - 0.5) * 60) + 'px';
    p.style.top = y + 'px';
    p.style.animationDuration = (0.6 + Math.random() * 0.8) + 's';
    p.style.animationDelay = (Math.random() * 0.3) + 's';
    container.appendChild(p);
    setTimeout(() => p.remove(), 1500);
  }
}

function moveButton() {
  const container = document.getElementById('btnContainer');
  const btn = document.getElementById('waterBtn');
  const maxMove = container.offsetWidth - btn.offsetWidth;
  if (maxMove <= 0) return;

  let x, y;
  // Move to random position
  const rect = container.getBoundingClientRect();
  const btnRect = btn.getBoundingClientRect();

  // Random offset within container
  x = Math.max(-50, Math.min(maxMove + 50, (Math.random() - 0.5) * maxMove * 1.5));
  y = (Math.random() - 0.5) * 40;

  btn.style.transform = `translate(${x}px, ${y}px)`;
  btn.classList.add('dodging');
  setTimeout(() => btn.classList.remove('dodging'), 300);
}

function updateMsg(text, showCounter = true) {
  const el = document.getElementById('msg');
  let html = text;
  if (showCounter) {
    html += `<br><span class="counter">已尝试 ${attempts} 次浇水 | 成功率 0%</span>`;
  }
  el.innerHTML = html;
}

function waterOneCrop() {
  const dry = document.querySelectorAll('.crop.dry');
  if (dry.length > 0) {
    const crop = dry[Math.floor(Math.random() * dry.length)];
    crop.classList.remove('dry');
    crop.classList.add('watered');
    crop.querySelector('.crop-status').textContent = '✅ 已浇';
  }
}

function tryWater() {
  if (wateringDone) return;

  attempts++;
  const btn = document.getElementById('waterBtn');
  const btnRect = btn.getBoundingClientRect();

  // Create particles at button position
  createParticles(btnRect.left + btnRect.width / 2, btnRect.top);

  if (attempts < 20) {
    // Dodge!
    moveButton();
    updateMsg(getRandomMsg());
  } else if (attempts < 25) {
    // Start watering but still dodging
    moveButton();
    const fake = ["💧 浇到一半...水壶又跑了！", "😤 浇了！但是只浇到一颗...", "🤏 快了！差一点点！"];
    updateMsg(fake[Math.floor(Math.random() * fake.length)]);
    if (attempts % 2 === 0) waterOneCrop();
  } else {
    // Finally give in
    wateringDone = true;
    btn.style.transform = 'translate(0, 0)';
    document.querySelectorAll('.crop').forEach(c => {
      c.classList.remove('dry');
      c.classList.add('watered');
      c.querySelector('.crop-status').textContent = '✅ 已浇';
    });
    updateMsg('✅ 浇水成功！你的菜终于得救了！🥳', false);

    // Show win dialog
    setTimeout(() => {
      document.getElementById('winStats').textContent =
        `你点了 ${attempts} 次，终于浇上了。\n菜都快被你点死了...`;
      document.getElementById('winOverlay').classList.add('show');
    }, 800);
  }
}

function closeWin() {
  document.getElementById('winOverlay').classList.remove('show');
  // Reset for another round
  setTimeout(() => {
    attempts = 0;
    wateringDone = false;
    document.getElementById('waterBtn').style.transform = 'translate(0, 0)';
    document.querySelectorAll('.crop').forEach(c => {
      c.classList.remove('watered');
      c.classList.add('dry');
      c.querySelector('.crop-status').textContent = '💧缺水';
    });
    updateMsg('');
  }, 500);
}

// Touch support for mobile
document.getElementById('waterBtn').addEventListener('touchstart', function(e) {
  e.preventDefault();
  tryWater();
});

// Random subtle button movement on hover (desktop)
document.getElementById('waterBtn').addEventListener('mouseenter', function() {
  if (!wateringDone && attempts > 0 && Math.random() > 0.5) {
    moveButton();
  }
});

// Initial message
setTimeout(() => {
  updateMsg('🌱 菜地干旱！快点击浇水！', false);
}, 500);
</script>
</body>
</html>
